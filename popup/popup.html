<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TabStick</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="../assets/icons/icon48.png" alt="Logo" class="logo">
    <h1>TabStick</h1>
  </div>
  
  <div class="url-display" id="url-display">Loading...</div>
  
  <div class="stats" id="stats">
    <span id="note-count">0</span> notes on this page
  </div>

  <div class="actions">
    <button id="btn-add" class="btn btn-primary">+ Add Note</button>
    <button id="btn-toggle" class="btn btn-secondary">Hide Notes</button>
    <button id="btn-clear" class="btn btn-danger">Clear All</button>
  </div>
  
  <div class="error-msg" id="error-msg" style="display: none;">
    Notes are not available on this page.
  </div>

  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
